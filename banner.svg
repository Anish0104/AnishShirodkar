<svg width="1280" height="320" viewBox="0 0 1280 320" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Anish Shirodkar GitHub Banner</title>
  <desc id="desc">Gradient banner for AI and machine learning engineer profile</desc>
  <defs>
    <linearGradient id="bg" x1="80" y1="30" x2="1200" y2="320" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0F172A"/>
      <stop offset="0.45" stop-color="#312E81"/>
      <stop offset="0.75" stop-color="#6D28D9"/>
      <stop offset="1" stop-color="#06B6D4"/>
    </linearGradient>
    <radialGradient id="glow1" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(240 70) rotate(31) scale(300 180)">
      <stop stop-color="#A78BFA" stop-opacity="0.42"/>
      <stop offset="1" stop-color="#A78BFA" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(1030 260) rotate(145) scale(340 190)">
      <stop stop-color="#67E8F9" stop-opacity="0.30"/>
      <stop offset="1" stop-color="#67E8F9" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur"><feGaussianBlur stdDeviation="40"/></filter>
  </defs>

  <rect width="1280" height="320" rx="28" fill="url(#bg)"/>
  <ellipse cx="250" cy="72" rx="250" ry="120" fill="url(#glow1)" filter="url(#blur)"/>
  <ellipse cx="1030" cy="260" rx="250" ry="120" fill="url(#glow2)" filter="url(#blur)"/>

  <g opacity="0.18">
    <circle cx="950" cy="70" r="44" stroke="white"/>
    <circle cx="1048" cy="132" r="18" fill="white"/>
    <circle cx="1096" cy="82" r="10" fill="#67E8F9"/>
    <path d="M940 220C1010 170 1110 170 1180 220" stroke="white" stroke-width="2" stroke-linecap="round" stroke-dasharray="6 8"/>
    <path d="M860 220L910 160L980 200L1040 140" stroke="#C4B5FD" stroke-width="3" stroke-linecap="round"/>
    <circle cx="860" cy="220" r="7" fill="#C4B5FD"/>
    <circle cx="910" cy="160" r="7" fill="#C4B5FD"/>
    <circle cx="980" cy="200" r="7" fill="#C4B5FD"/>
    <circle cx="1040" cy="140" r="7" fill="#C4B5FD"/>
  </g>

  <g opacity="0.16">
    <rect x="70" y="66" width="280" height="180" rx="24" fill="white"/>
    <path d="M110 197L160 158L208 182L260 118L315 154" stroke="#0F172A" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="160" cy="158" r="8" fill="#0F172A"/>
    <circle cx="208" cy="182" r="8" fill="#0F172A"/>
    <circle cx="260" cy="118" r="8" fill="#0F172A"/>
    <circle cx="315" cy="154" r="8" fill="#0F172A"/>
  </g>

  <text x="84" y="110" fill="white" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="22" font-weight="700" opacity="0.95">AI • ML • CV • RAG • LLM Systems</text>
  <text x="84" y="170" fill="white" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="54" font-weight="800">Anish Shirodkar</text>
  <text x="84" y="214" fill="#D8EAFE" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="24" font-weight="600">Building production-ready AI systems from model to product</text>

  <g transform="translate(84 246)">
    <rect width="170" height="38" rx="19" fill="rgba(255,255,255,0.12)" stroke="rgba(255,255,255,0.26)"/>
    <text x="20" y="25" fill="white" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="16" font-weight="700">MS CS @ Rutgers</text>
  </g>
  <g transform="translate(270 246)">
    <rect width="172" height="38" rx="19" fill="rgba(255,255,255,0.12)" stroke="rgba(255,255,255,0.26)"/>
    <text x="20" y="25" fill="white" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="16" font-weight="700">Open to 2026 internships</text>
  </g>
  <g transform="translate(458 246)">
    <rect width="200" height="38" rx="19" fill="rgba(255,255,255,0.12)" stroke="rgba(255,255,255,0.26)"/>
    <text x="20" y="25" fill="white" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="16" font-weight="700">Full-stack AI applications</text>
  </g>
</svg>
